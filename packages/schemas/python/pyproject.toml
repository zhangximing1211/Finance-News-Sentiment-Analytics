[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "finance-schemas"
version = "0.1.0"
description = "Pydantic schemas for the finance sentiment agent."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.8,<3.0",
]

[tool.setuptools]
packages = ["finance_schemas"]
